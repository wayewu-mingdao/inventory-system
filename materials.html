<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材管理｜耗材盤點系統</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <aside class="sidebar">
        <div class="logo">FutureShock 113P</div>
        <nav>
            <ul>
                <li><a href="index.html">總覽</a></li>
                <li class="active"><a href="materials.html">耗材管理</a></li>
                <li><a href="inbound.html">入庫管理</a></li>
                <li><a href="outbound.html">出庫管理</a></li>
                <li><a href="#">盤點紀錄</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <h2 id="page-title">耗材管理</h2>
            <div class="user-profile">管理員</div>
        </header>

        <section id="materials-view" class="view-section active-view">
            <section class="management-panel">
                <div class="section-header">
                    <div>
                        <h3>耗材管理</h3>
                        <p id="materials-count">正在同步耗材資料...</p>
                    </div>
                </div>

                <div class="management-toolbar">
                    <input id="materials-search" type="search" placeholder="搜尋編號、名稱、規格或館室">
                    <select id="materials-status-filter" aria-label="依庫存狀態篩選">
                        <option value="all">全部狀態</option>
                        <option value="缺貨">缺貨</option>
                        <option value="需補貨">需補貨</option>
                        <option value="庫存偏低">庫存偏低</option>
                        <option value="足夠">足夠</option>
                    </select>
                    <select id="materials-room-filter" aria-label="依館室篩選">
                        <option value="all">全部館室</option>
                    </select>
                </div>

                <div class="materials-table-wrap">
                    <table class="materials-table">
                        <thead>
                            <tr>
                                <th>耗材編號</th>
                                <th>耗材名稱</th>
                                <th>類別</th>
                                <th>規格/型號</th>
                                <th>館室</th>
                                <th>目前庫存</th>
                                <th>安全庫存</th>
                                <th>狀態</th>
                            </tr>
                        </thead>
                        <tbody id="materials-table-body">
                            <tr>
                                <td colspan="8" class="table-message">資料載入中，請稍候...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js?v=20260521-get-write"></script>
</body>
</html>
