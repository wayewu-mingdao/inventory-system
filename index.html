<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材盤點系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">FutureShock 113P</div>
        <nav>
            <ul>
                <li class="active"><a href="index.html" data-page="dashboard">總覽</a></li>
                <li><a href="materials.html">耗材管理</a></li>
                <li><a href="inbound.html">入庫管理</a></li>
                <li><a href="outbound.html">出庫管理</a></li>
                <li><a href="#">盤點紀錄</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <h2 id="page-title">耗材盤點系統</h2>
            <div class="user-profile">管理員</div>
        </header>

        <section id="dashboard-view" class="view-section active-view">
       <section class="summary-cards">
            <div class="card">
                <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">耗材總數</h3>
                <p class="number">1,248 <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">項</span></p>
            </div>
            <div class="card">
                <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">低庫存項目</h3>
                <p class="number" style="color: #f59e0b;">23 <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">項</span></p>
            </div>
            <div class="card">
                <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">即將耗盡</h3>
                <p class="number" style="color: #f59e0b;">8 <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">項</span></p>
            </div>
        </section>

        <section class="charts-section">

    <!-- 左邊 -->
    <div class="chart-container" style="flex:2;">

        <h3 style="margin-bottom:20px;">
            耗材統計分析
        </h3>

        <div style="
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        ">

            <div style="flex:1; min-width:300px;">
                <h4 style="margin-bottom:10px; color:#94a3b8;">
                    所有耗材類別比例
                </h4>

                <div id="all-category-chart"
                    style="width:100%; height:300px;">
                </div>
            </div>

            <div style="flex:1; min-width:300px;">
                <h4 style="margin-bottom:10px; color:#94a3b8;">
                    各類別缺料比例
                </h4>

                <div id="shortage-category-chart"
                    style="width:100%; height:300px;">
                </div>
            </div>

        </div>
    </div>

    <!-- 右邊 -->
    <div class="chart-container" style="flex:1;">

        <h3 style="margin-bottom:20px;">
            各館室缺貨物品
        </h3>

        <div id="room-shortage-list"></div>

    </div>

</section>
        <section class="table-section" style="margin-top: 20px; background-color: #111827; padding: 20px; border-radius: 8px; border: 1px solid #1e293b;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #e2e8f0; font-size: 16px;">庫存狀態列表 (即時來自 Google Sheet)</h3>
                <button style="background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 5px 15px; border-radius: 4px; cursor: pointer;">查看全部</button>
            </div>
            
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                <thead>
                    <tr style="border-bottom: 1px solid #1e293b; color: #94a3b8;">
                        <th style="padding: 12px;">耗材編號</th>
                        <th style="padding: 12px;">耗材名稱</th>
                        <th style="padding: 12px;">規格/型號</th>
                        <th style="padding: 12px;">館室</th>
                        <th style="padding: 12px;">存放位置</th>
                        <th style="padding: 12px;">目前庫存</th>
                        <th style="padding: 12px;">安全庫存</th>
                        <th style="padding: 12px;">狀態</th>
                    </tr>
                </thead>
                <tbody id="inventory-table-body">
                    <tr>
                        <td colspan="8" style="padding: 20px; text-align: center; color: #94a3b8;">資料載入中，請稍候...</td>
                    </tr>
                </tbody>
            </table>
        </section>
        </section>

        <section id="materials-view" class="view-section">
            <section class="management-panel">
                <div class="section-header">
                    <div>
                        <h3>耗材管理</h3>
                        <p id="materials-count">正在同步耗材資料...</p>
                    </div>
                </div>

                <div class="management-toolbar">
                    <input id="materials-search" type="search" placeholder="搜尋編號、名稱、規格、館室或位置">
                    <select id="materials-status-filter" aria-label="依庫存狀態篩選">
                        <option value="all">全部狀態</option>
                        <option value="缺貨">缺貨</option>
                        <option value="需補貨">需補貨</option>
                        <option value="庫存偏低">庫存偏低</option>
                        <option value="足夠">足夠</option>
                    </select>
                    <select id="materials-room-filter" aria-label="依館室篩選">
                        <option value="all">全部館室</option>
                    </select>
                </div>

                <div class="materials-table-wrap">
                    <table class="materials-table">
                        <thead>
                            <tr>
                                <th>耗材編號</th>
                                <th>耗材名稱</th>
                                <th>類別</th>
                                <th>規格/型號</th>
                                <th>館室</th>
                                <th>存放位置</th>
                                <th>目前庫存</th>
                                <th>安全庫存</th>
                                <th>狀態</th>
                            </tr>
                        </thead>
                        <tbody id="materials-table-body">
                            <tr>
                                <td colspan="9" class="table-message">資料載入中，請稍候...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </section>
    </main>

    <script src="script.js?v=20260521-jsonp-write"></script>
</body>
</html>
