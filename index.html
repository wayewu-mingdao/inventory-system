<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>耗材盤點系統</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">FutureShock 113P</div>
        <nav>
            <ul>
                <li class="active"><a href="#">總覽</a></li>
                <li><a href="#">耗材管理</a></li>
                <li><a href="#">入庫管理</a></li>
                <li><a href="#">出庫管理</a></li>
                <li><a href="#">盤點紀錄</a></li>
            </ul>
        </nav>
    </aside>

    <main class="main-content">
        <header class="top-nav">
            <h2>耗材盤點系統</h2>
            <div class="user-profile">管理員</div>
        </header>

       <section class="summary-cards">
            <div class="card">
                <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">耗材總數</h3>
                <p class="number">1,248 <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">項</span></p>
                <span class="trend up" style="font-size: 12px;">▲ 較上月 6.2%</span>
            </div>
            <div class="card">
                <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">低庫存項目</h3>
                <p class="number" style="color: #f59e0b;">23 <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">項</span></p>
                <span class="trend down" style="font-size: 12px;">▼ 較上月 4.2%</span>
            </div>
            <div class="card">
                <h3 style="color: #94a3b8; font-size: 14px; margin-bottom: 10px;">即將耗盡</h3>
                <p class="number" style="color: #f59e0b;">8 <span style="font-size: 14px; font-weight: normal; color: #94a3b8;">項</span></p>
                <span class="trend down" style="font-size: 12px;">▼ 較上月 11.1%</span>
            </div>
        </section>

        <section class="charts-section">
            <div class="chart-container">
                <h3>庫存狀態分布</h3>
                <div id="donut-chart" style="width: 100%; height: 300px;"></div>
            </div>
            <div class="chart-container">
                <h3>各館室缺貨物品</h3>
                <div id="room-shortage-list" style="padding-top: 10px;"></div>
            </div>
        </section>
        <section class="table-section" style="margin-top: 20px; background-color: #111827; padding: 20px; border-radius: 8px; border: 1px solid #1e293b;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="color: #e2e8f0; font-size: 16px;">庫存狀態列表 (即時來自 Google Sheet)</h3>
                <button style="background: transparent; border: 1px solid #3b82f6; color: #3b82f6; padding: 5px 15px; border-radius: 4px; cursor: pointer;">查看全部</button>
            </div>
            
            <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 14px;">
                <thead>
                    <tr style="border-bottom: 1px solid #1e293b; color: #94a3b8;">
                        <th style="padding: 12px;">耗材編號</th>
                        <th style="padding: 12px;">耗材名稱</th>
                        <th style="padding: 12px;">規格/型號</th>
                        <th style="padding: 12px;">館室</th>
                        <th style="padding: 12px;">存放位置</th>
                        <th style="padding: 12px;">目前庫存</th>
                        <th style="padding: 12px;">安全庫存</th>
                        <th style="padding: 12px;">狀態</th>
                    </tr>
                </thead>
                <tbody id="inventory-table-body">
                    <tr>
                        <td colspan="6" style="padding: 20px; text-align: center; color: #94a3b8;">資料載入中，請稍候...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
